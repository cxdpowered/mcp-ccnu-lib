services:
  ccnu-library-mcp:
    build: .
    image: mcp-ccnu-lib
    container_name: ccnu-library-mcp
    # .env 提供账号等机密；下方 environment 覆盖非机密配置，
    # 避免 env_file 对带引号的 URL 处理不一致（CCNU_BASE_URL 含 # hash 路由）。
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8010"
      CHALLENGE_TTL_SECONDS: "240"
    ports:
      - "8010:8010"
    volumes:
      - ./data:/data        # 持久化 session.json(cookie+token) / SQLite / 验证码图，重启后静默 SSO 免登录
    restart: unless-stopped
